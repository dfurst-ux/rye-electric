<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rye Electric — Office Clock</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --primary:#2980b9;
    --teal-bright:#17a2b8;
    --success:#27ae60;
    --error:#c0392b;
    --bg:#f5f7fa;
    --card:#ffffff;
    --text:#2c3e50;
    --text-soft:#7f8c8d;
    --line:#ecf0f1;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Lato',sans-serif;background:var(--bg);color:var(--text);}
  .container{max-width:900px;margin:0 auto;padding:20px;}
  .hdr{
    background:linear-gradient(135deg, #2980b9, #1e5a8e);
    color:#fff;
    padding:16px 28px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-radius:8px;
    margin-bottom:24px;
    box-shadow:0 2px 8px rgba(0,0,0,0.15);
  }
  .wordmark{font-weight:700;font-size:18px;display:flex;align-items:center;gap:4px;}
  .bolt{font-size:20px;}
  .electric{color:#79B7F1;}
  .hdr-title{font-size:14px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;}
  .hdr-clock{
    background:rgba(255,255,255,0.2);
    padding:8px 16px;
    border-radius:6px;
    font-family:monospace;
    font-size:16px;
    font-weight:700;
  }
  .scan-container{
    background:var(--card);
    border:2px solid #d4a574;
    border-radius:12px;
    padding:36px 28px;
    text-align:center;
    margin-bottom:24px;
    box-shadow:0 2px 12px rgba(0,0,0,0.08);
  }
  .rye-logo{
    font-family:'Poppins',sans-serif;
    font-weight:700;
    font-size:40px;
    margin-bottom:16px;
  }
  .rye-logo .electric{color:#79B7F1;}
  .scan-zone-title{
    font-size:22px;
    font-weight:700;
    color:var(--text);
    margin-bottom:8px;
  }
  .scan-zone-sub{
    color:var(--text-soft);
    font-size:14px;
    margin-bottom:20px;
  }
  #scanInput{
    font-size:28px;
    padding:16px 20px;
    border:2.5px solid var(--teal-bright);
    border-radius:10px;
    width:100%;
    max-width:400px;
    text-align:center;
    font-weight:700;
    color:var(--text);
  }
  #scanInput:focus{
    outline:none;
    box-shadow:0 0 0 5px rgba(41,128,185,0.16);
    border-color:var(--primary);
  }
  .roster{
    background:var(--card);
    border-radius:10px;
    padding:20px;
    margin-bottom:24px;
    box-shadow:0 2px 8px rgba(0,0,0,0.06);
  }
  .roster-header{
    font-size:12px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--text-soft);
    margin-bottom:12px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .roster-count{
    background:var(--success);
    color:#fff;
    padding:3px 10px;
    border-radius:20px;
    font-size:13px;
    font-weight:700;
  }
  .roster-row{
    display:flex;
    align-items:center;
    gap:12px;
    padding:10px 0;
    border-bottom:1px solid var(--line);
  }
  .roster-row:last-child{border-bottom:none;}
  .led-dot{
    width:10px;
    height:10px;
    background:var(--success);
    border-radius:50%;
    flex-shrink:0;
  }
  .roster-name{font-weight:700;color:var(--text);flex:1;}
  .roster-time{font-size:12px;color:var(--text-soft);}
  .muted-note{color:var(--text-soft);font-style:italic;}
  .toast-container{
    position:fixed;
    top:20px;
    right:20px;
    z-index:10000;
    pointer-events:none;
  }
  .toast{
    background:#fff;
    padding:14px 18px;
    border-radius:8px;
    margin-bottom:10px;
    box-shadow:0 4px 16px rgba(0,0,0,0.15);
    pointer-events:all;
    animation:slideIn 0.3s ease;
  }
  @keyframes slideIn{from{transform:translateX(400px);opacity:0}to{transform:translateX(0);opacity:1}}
  .toast.success{border-left:4px solid var(--success);}
  .toast.err{border-left:4px solid var(--error);}
  .toast-title{font-weight:700;font-size:13px;}
  .toast-msg{font-size:12px;color:var(--text-soft);margin-top:2px;}
</style>
</head>
<body>
<div class="container">
  <div class="hdr">
    <div class="wordmark">
      <span class="bolt">⚡</span>
      <span>rye <span class="electric">electric</span></span>
      <span class="hdr-title" style="margin-left:12px;">OFFICE CLOCK</span>
    </div>
    <div class="hdr-clock" id="hdrClock">--:--:--</div>
  </div>

  <div class="scan-container">
    <div class="rye-logo">rye <span class="electric">electric</span></div>
    <div class="scan-zone-title">Scan your badge to clock in or out</div>
    <div class="scan-zone-sub">Use a barcode scanner, or type your employee ID and press Enter</div>
    <form id="scanForm" onsubmit="return handleScanSubmit(event)">
      <input type="text" id="scanInput" autocomplete="off" autofocus placeholder="Waiting for scan...">
    </form>
  </div>

  <div class="roster">
    <div class="roster-header">
      <span>Currently Clocked In</span>
      <span class="roster-count" id="rosterCount">0</span>
    </div>
    <div id="rosterList">
      <div class="roster-row"><span class="muted-note">Loading roster...</span></div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
  const SUPABASE_URL = 'https://okesnavkxmqucgvvhncx.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rZXNuYXZreG1xdWNndnZobmN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MzY2ODUsImV4cCI6MjA5NTMxMjY4NX0.-FCoWt0B7Eb60bcGzTMhT0TRIsqd6Vk-2XfVhbsEK7c';
  let supabaseClient = null;

  try{
    if(window.supabase){
      supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    }
  }catch(e){console.error('Supabase init failed:',e);}

  let staffList = [];
  let scanAutoSubmitTimer = null;

  function startOfToday(){
    const d = new Date();
    d.setHours(0,0,0,0);
    return d;
  }

  function fmtTime(date){
    let h = date.getHours();
    const m = String(date.getMinutes()).padStart(2,'0');
    const ap = h>=12 ? 'PM' : 'AM';
    h = h%12 || 12;
    return h+':'+m+' '+ap;
  }

  function showResult(type, title, msg){
    const tc = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = 'toast '+type;
    t.innerHTML = '<div class="toast-title">'+title+'</div><div class="toast-msg">'+msg+'</div>';
    tc.appendChild(t);
    setTimeout(()=>t.remove(), 4000);
  }

  function refocusScan(){
    setTimeout(()=>document.getElementById('scanInput').focus(), 50);
  }

  function handleScanSubmit(e){
    e.preventDefault();
    const input = document.getElementById('scanInput');
    const val = input.value.trim();
    input.value = '';
    clearTimeout(scanAutoSubmitTimer);
    if(val) processScan(val, 'scanner');
    return false;
  }

  function handleScanInputChange(){
    clearTimeout(scanAutoSubmitTimer);
    scanAutoSubmitTimer = setTimeout(function(){
      const input = document.getElementById('scanInput');
      if(input && input.value.trim()){
        document.getElementById('scanForm').requestSubmit
          ? document.getElementById('scanForm').requestSubmit()
          : handleScanSubmit({preventDefault:function(){}});
      }
    }, 400);
  }

  async function processScan(rawValue, source){
    const empId = parseInt(rawValue.replace(/\D/g,''),10);
    if(!empId || isNaN(empId)){
      showResult('err','Invalid badge','That barcode did not contain a valid employee ID.');
      refocusScan();
      return;
    }

    const emp = staffList.find(e=>e.employee_id===empId);
    if(!emp){
      showResult('err','Unknown badge','Employee ID '+empId+' is not in the staff roster yet.');
      refocusScan();
      return;
    }
    if(!emp.active){
      showResult('err',emp.first_name+' '+emp.last_name,'This staff member is marked inactive.');
      refocusScan();
      return;
    }

    const { data: lastPunch, error: lastErr } = await supabaseClient
      .from('office_portal_punches')
      .select('*')
      .eq('employee_id', empId)
      .gte('punched_at', startOfToday().toISOString())
      .order('punched_at',{ascending:false})
      .limit(1);

    if(lastErr){
      showResult('err','Connection error','Could not reach the database. Check your internet connection and try again.');
      refocusScan();
      return;
    }

    const newType = (!lastPunch || lastPunch.length===0 || lastPunch[0].event_type==='out') ? 'in' : 'out';

    const { error: insErr } = await supabaseClient.from('office_portal_punches').insert({
      employee_id: empId,
      event_type: newType,
      source: source
    });

    if(insErr){
      showResult('err','Clock error','Failed to record your punch. Please try again.');
      refocusScan();
      return;
    }

    const action = newType==='in' ? 'Clocked in' : 'Clocked out';
    showResult('success',emp.first_name+' '+emp.last_name,action+' at '+fmtTime(new Date()));
    refocusScan();
    loadRoster();
  }

  function tickClock(){
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('hdrClock').textContent = h+':'+m+':'+s;
  }

  async function loadStaffList(){
    if(!supabaseClient) return;
    const { data } = await supabaseClient.from('office_portal_employees').select('*');
    staffList = data || [];
  }

  async function loadRoster(){
    const { data, error } = await supabaseClient
      .from('office_portal_punches')
      .select('employee_id,event_type,punched_at')
      .gte('punched_at', startOfToday().toISOString())
      .order('punched_at',{ascending:true});

    const list = document.getElementById('rosterList');
    const countEl = document.getElementById('rosterCount');
    if(error || !data){
      list.innerHTML = '<div class="roster-row"><span class="muted-note">Could not load roster</span></div>';
      return;
    }

    const lastByEmp = {};
    data.forEach(p => { lastByEmp[p.employee_id] = p; });

    const currentlyIn = Object.values(lastByEmp).filter(p=>p.event_type==='in');
    countEl.textContent = currentlyIn.length;

    if(currentlyIn.length===0){
      list.innerHTML = '<div class="roster-row"><span class="muted-note">No one is currently clocked in</span></div>';
      return;
    }

    list.innerHTML = currentlyIn
      .sort((a,b)=> new Date(a.punched_at) - new Date(b.punched_at))
      .map(p=>{
        const emp = staffList.find(e=>e.employee_id===p.employee_id);
        const name = emp ? emp.first_name+' '+emp.last_name : 'Employee '+p.employee_id;
        return '<div class="roster-row"><span class="led-dot"></span><span class="roster-name">'+name+'</span>'
          +'<span class="roster-time">since '+fmtTime(new Date(p.punched_at))+'</span></div>';
      }).join('');
  }

  document.addEventListener('DOMContentLoaded', async function(){
    await loadStaffList();
    loadRoster();
    setInterval(loadRoster, 30000);
    
    const scanInput = document.getElementById('scanInput');
    if(scanInput){
      scanInput.addEventListener('input', handleScanInputChange);
    }
  });

  setInterval(tickClock, 1000);
  tickClock();
</script>
</body>
</html>
