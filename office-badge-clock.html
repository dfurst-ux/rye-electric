<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rye Electric — Office Clock</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --primary:#2980b9;
    --teal-bright:#17a2b8;
    --success:#27ae60;
    --error:#c0392b;
    --bg:#f5f7fa;
    --card:#ffffff;
    --text:#2c3e50;
    --text-soft:#7f8c8d;
    --line:#ecf0f1;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Lato',sans-serif;background:var(--bg);color:var(--text);}
  .container{max-width:900px;margin:0 auto;padding:20px;}
  .hdr{
    background:linear-gradient(135deg, #2980b9, #1e5a8e);
    color:#fff;
    padding:16px 28px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-radius:8px;
    margin-bottom:24px;
    box-shadow:0 2px 8px rgba(0,0,0,0.15);
  }
  .wordmark{font-weight:700;font-size:18px;display:flex;align-items:center;gap:4px;}
  .bolt{font-size:20px;}
  .electric{color:#79B7F1;}
  .hdr-title{font-size:14px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;}
  .hdr-clock{
    background:rgba(255,255,255,0.2);
    padding:8px 16px;
    border-radius:6px;
    font-family:monospace;
    font-size:16px;
    font-weight:700;
  }
  .scan-container{
    background:var(--card);
    border:2px solid #d4a574;
    border-radius:12px;
    padding:36px 28px;
    text-align:center;
    margin-bottom:24px;
    box-shadow:0 2px 12px rgba(0,0,0,0.08);
  }
  .rye-logo{
    font-family:'Poppins',sans-serif;
    font-weight:700;
    font-size:40px;
    margin-bottom:16px;
  }
  .rye-logo .electric{color:#79B7F1;}
  .scan-zone-title{
    font-size:22px;
    font-weight:700;
    color:var(--text);
    margin-bottom:8px;
  }
  .scan-zone-sub{
    color:var(--text-soft);
    font-size:14px;
    margin-bottom:20px;
  }
  #scanInput{
    font-size:28px;
    padding:16px 20px;
    border:2.5px solid var(--teal-bright);
    border-radius:10px;
    width:100%;
    max-width:400px;
    text-align:center;
    font-weight:700;
    color:var(--text);
  }
  #scanInput:focus{
    outline:none;
    box-shadow:0 0 0 5px rgba(41,128,185,0.16);
    border-color:var(--primary);
  }
  .roster{
    background:var(--card);
    border-radius:10px;
    padding:20px;
    margin-bottom:24px;
    box-shadow:0 2px 8px rgba(0,0,0,0.06);
  }
  .roster-header{
    font-size:12px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--text-soft);
    margin-bottom:12px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .roster-count{
    background:var(--success);
    color:#fff;
    padding:3px 10px;
    border-radius:20px;
    font-size:13px;
    font-weight:700;
  }
  .roster-row{
    display:flex;
    align-items:center;
    gap:12px;
    padding:10px 0;
    border-bottom:1px solid var(--line);
  }
  .roster-row:last-child{border-bottom:none;}
  .led-dot{
    width:10px;
    height:10px;
    background:var(--success);
    border-radius:50%;
    flex-shrink:0;
  }
  .roster-name{font-weight:700;color:var(--text);flex:1;}
  .roster-time{font-size:12px;color:var(--text-soft);}
  .muted-note{color:var(--text-soft);font-style:italic;}
  .toast-container{
    position:fixed;
    top:20px;
    right:20px;
    z-index:10000;
    pointer-events:none;
  }
  .toast{
    background:#fff;
    padding:14px 18px;
    border-radius:8px;
    margin-bottom:10px;
    box-shadow:0 4px 16px rgba(0,0,0,0.15);
    pointer-events:all;
    animation:slideIn 0.3s ease;
  }
  @keyframes slideIn{from{transform:translateX(400px);opacity:0}to{transform:translateX(0);opacity:1}}
  .toast.success{border-left:4px solid var(--success);}
  .toast.err{border-left:4px solid var(--error);}
  .toast-title{font-weight:700;font-size:13px;}
  .toast-msg{font-size:12px;color:var(--text-soft);margin-top:2px;}
</style>
</head>
<body>
<div class="container">
  <div class="hdr">
    <div class="wordmark">
      <span class="bolt">⚡</span>
      <span>rye <span class="electric">electric</span></span>
      <span class="hdr-title" style="margin-left:12px;">OFFICE CLOCK</span>
    </div>
    <div class="hdr-clock" id="hdrClock">--:--:--</div>
  </div>

  <div class="scan-container">
    <div class="rye-logo">rye <span class="electric">electric</span></div>
    <div class="scan-zone-title">Scan your badge to clock in or out</div>
    <div class="scan-zone-sub">Use a barcode scanner, or type your employee ID and press Enter</div>
    <form id="scanForm" onsubmit="return handleScanSubmit(event)">
      <input type="text" id="scanInput" autocomplete="off" autofocus placeholder="Waiting for scan..." oninput="handleScanInputChange()" onfocus="resetScanInputTiming()">
    </form>
  </div>

  <div class="roster">
    <div class="roster-header">
      <span>Currently Clocked In</span>
      <span class="roster-count" id="rosterCount">0</span>
    </div>
    <div id="rosterList">
      <div class="roster-row"><span class="muted-note">Loading roster...</span></div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
