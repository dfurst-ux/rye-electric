<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rye Electric — New Hire Onboarding</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }
  a { color: inherit; }

  .page { max-width: 640px; margin: 0 auto; padding: 2rem 1rem 4rem; }

  .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 2rem; }
  .logo-mark { width: 40px; height: 40px; border-radius: 10px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 13px; font-weight: 600; }
  .logo-text { display: flex; flex-direction: column; }
  .logo-name { font-size: 16px; font-weight: 600; }
  .logo-sub { font-size: 12px; color: #888; }

  .progress { display: flex; align-items: center; gap: 6px; margin-bottom: 2rem; flex-wrap: wrap; }
  .pdot { width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid #ddd; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #999; background: #fff; flex-shrink: 0; }
  .pdot.active { border-color: #1a1a1a; color: #1a1a1a; font-weight: 600; }
  .pdot.done { background: #1a1a1a; border-color: #1a1a1a; color: #fff; }
  .pline { flex: 1; height: 1px; background: #e0e0e0; min-width: 8px; }

  .card { background: #fff; border: 1px solid #e8e8e8; border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
  .card-title { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
  .card-sub { font-size: 13px; color: #888; margin-bottom: 1.25rem; line-height: 1.5; }

  .row { display: grid; gap: 12px; margin-bottom: 12px; }
  .row.col2 { grid-template-columns: 1fr 1fr; }
  .row.col3 { grid-template-columns: 1fr 1fr 1fr; }
  .row.col1 { grid-template-columns: 1fr; }

  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.04em; }
  .field input, .field select, .field textarea {
    font-family: inherit; font-size: 14px; padding: 9px 12px;
    border: 1px solid #e0e0e0; border-radius: 8px; background: #fff; color: #1a1a1a;
    outline: none; transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus { border-color: #1a1a1a; }
  .field input:disabled { background: #f5f5f3; color: #999; }

  .divider { font-size: 11px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.07em; border-top: 1px solid #f0f0f0; padding-top: 1rem; margin: 1.25rem 0 0.75rem; }

  .radio-group { display: flex; flex-direction: column; gap: 8px; }
  .radio-opt { display: flex; align-items: center; gap: 10px; font-size: 14px; cursor: pointer; padding: 2px 0; }
  .radio-opt input { width: 16px; height: 16px; cursor: pointer; accent-color: #1a1a1a; }

  .policy-box { background: #f9f9f7; border: 1px solid #ebebeb; border-radius: 8px; padding: 12px; font-size: 13px; color: #666; line-height: 1.65; max-height: 150px; overflow-y: auto; margin-bottom: 10px; }
  .ack { display: flex; align-items: flex-start; gap: 10px; font-size: 14px; margin-bottom: 10px; cursor: pointer; }
  .ack input { width: 16px; height: 16px; margin-top: 2px; flex-shrink: 0; accent-color: #1a1a1a; cursor: pointer; }

  .btn-row { display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; }
  .btn { padding: 10px 22px; border-radius: 9px; font-size: 14px; font-weight: 500; cursor: pointer; border: 1px solid #ddd; background: #fff; color: #1a1a1a; font-family: inherit; transition: background 0.15s; display: inline-flex; align-items: center; gap: 6px; }
  .btn:hover { background: #f5f5f3; }
  .btn.primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .btn.primary:hover { background: #333; }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }

  .success { text-align: center; padding: 3rem 1rem; }
  .success-icon { width: 60px; height: 60px; background: #1a1a1a; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; }
  .success-icon i { font-size: 26px; color: #fff; }
  .success h2 { font-size: 22px; font-weight: 600; margin-bottom: 0.5rem; }
  .success p { font-size: 14px; color: #888; line-height: 1.6; max-width: 360px; margin: 0 auto 0.75rem; }

  .error-bar { background: #fff0f0; border: 1px solid #ffcccc; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #cc0000; margin-bottom: 1rem; display: none; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity 0.25s; pointer-events: none; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; }

  .step-label { font-size: 13px; color: #aaa; }

  @media (max-width: 480px) {
    .row.col2, .row.col3 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="page">
  <div class="logo">
    <div class="logo-mark">rye</div>
    <div class="logo-text">
      <div class="logo-name">Rye Electric</div>
      <div class="logo-sub">New hire onboarding</div>
    </div>
  </div>

  <div id="error-bar" class="error-bar"></div>
  <div class="progress" id="progress"></div>
  <div id="content"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://mqwbteytnawzljcszeur.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xd2J0ZXl0bmF3emxqY3N6ZXVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyOTIzMzUsImV4cCI6MjA5Njg2ODMzNX0.9C4cxXDWQd17hfWcgHfUe9ansn8-NTT4KTd5plHnSMQ';

const STEPS = [
  { id: 'personal', label: 'Personal info' },
  { id: 'tax',      label: 'W-4 / DE 4' },
  { id: 'banking',  label: 'Direct deposit' },
  { id: 'i9',       label: 'Form I-9' },
  { id: 'policies', label: 'Policies' },
  { id: 'final',    label: 'Review & sign' },
];

let step = 0;
let fd = {};

async function sbInsert(table, data) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify(data)
  });
  if (!res.ok) throw new Error(await res.text());
}

function gv(id) { const e = document.getElementById(id); return e ? e.value.trim() : ''; }
function gr(name) { const e = document.querySelector(`input[name="${name}"]:checked`); return e ? e.value : ''; }
function gc(id) { const e = document.getElementById(id); return e ? e.checked : false; }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
function showError(msg) {
  const b = document.getElementById('error-bar');
  b.textContent = msg; b.style.display = 'block';
  setTimeout(() => b.style.display = 'none', 8000);
}

function buildProgress() {
  const bar = document.getElementById('progress');
  bar.innerHTML = '';
  STEPS.forEach((s, i) => {
    const d = document.createElement('div');
    d.className = 'pdot' + (i < step ? ' done' : i === step ? ' active' : '');
    d.title = s.label;
    d.innerHTML = i < step ? '<i class="ti ti-check" style="font-size:13px;"></i>' : (i + 1);
    bar.appendChild(d);
    if (i < STEPS.length - 1) {
      const l = document.createElement('div'); l.className = 'pline'; bar.appendChild(l);
    }
  });
}

function render() {
  buildProgress();
  const c = document.getElementById('content');
  const id = STEPS[step].id;
  const nav = (backFn, nextFn, nextLabel) => `
    <div class="btn-row">
      ${step > 0 ? `<button class="btn" onclick="${backFn}()"><i class="ti ti-arrow-left"></i> Back</button>` : `<span class="step-label">Step ${step+1} of ${STEPS.length}</span>`}
      <button class="btn primary" onclick="${nextFn}()">${nextLabel || 'Next'} <i class="ti ti-arrow-right"></i></button>
    </div>`;

  if (id === 'personal') {
    c.innerHTML = `
    <div class="card">
      <div class="card-title">Personal information</div>
      <div class="card-sub">Complete your new hire record. Fields marked * are required.</div>
      <div class="row col3">
        <div class="field"><label>First name *</label><input id="p_first" value="${fd.first||''}" placeholder="First"></div>
        <div class="field"><label>Middle initial</label><input id="p_mi" value="${fd.mi||''}" maxlength="1" placeholder="M"></div>
        <div class="field"><label>Last name *</label><input id="p_last" value="${fd.last||''}" placeholder="Last"></div>
      </div>
      <div class="row col1"><div class="field"><label>Street address</label><input id="p_addr" value="${fd.addr||''}" placeholder="123 Main St"></div></div>
      <div class="row col3">
        <div class="field"><label>City</label><input id="p_city" value="${fd.city||''}" placeholder="City"></div>
        <div class="field"><label>State</label><input id="p_state" value="${fd.state||''}" maxlength="2" placeholder="CA"></div>
        <div class="field"><label>ZIP</label><input id="p_zip" value="${fd.zip||''}" placeholder="90210"></div>
      </div>
      <div class="row col2">
        <div class="field"><label>Home phone</label><input id="p_phone" value="${fd.phone||''}" placeholder="(xxx) xxx-xxxx"></div>
        <div class="field"><label>Cell phone</label><input id="p_cell" value="${fd.cell||''}" placeholder="(xxx) xxx-xxxx"></div>
      </div>
      <div class="row col2">
        <div class="field"><label>Email *</label><input type="email" id="p_email" value="${fd.email||''}" placeholder="you@example.com"></div>
        <div class="field"><label>Date of birth</label><input type="date" id="p_dob" value="${fd.dob||''}"></div>
      </div>
      <div class="row col2">
        <div class="field"><label>Job title *</label><input id="p_title" value="${fd.title||''}" placeholder="e.g. Electrician"></div>
        <div class="field"><label>Start date *</label><input type="date" id="p_start" value="${fd.startDate||''}"></div>
      </div>
      <div class="divider">Emergency contact</div>
      <div class="row col2">
        <div class="field"><label>Contact name</label><input id="p_ec_name" value="${fd.ecName||''}" placeholder="Full name"></div>
        <div class="field"><label>Relationship</label><input id="p_ec_rel" value="${fd.ecRel||''}" placeholder="Spouse, parent…"></div>
      </div>
      <div class="row col1"><div class="field"><label>Contact phone</label><input id="p_ec_phone" value="${fd.ecPhone||''}" placeholder="(xxx) xxx-xxxx"></div></div>
    </div>
    ${nav('', 'savePersonal', 'Next')}`;
  }

  else if (id === 'tax') {
    c.innerHTML = `
    <div class="card">
      <div class="card-title">Tax withholding — W-4 & DE 4</div>
      <div class="card-sub">Federal and California withholding. Use <a href="https://www.irs.gov/W4App" target="_blank">irs.gov/W4App</a> for the most accurate amounts.</div>
      <div class="divider" style="margin-top:0;border-top:none;padding-top:0;">Federal W-4</div>
      <div class="row col1"><div class="field"><label>Filing status</label>
        <select id="t_w4">
          <option value="">Select…</option>
          <option value="single" ${fd.w4Status==='single'?'selected':''}>Single or married filing separately</option>
          <option value="married_joint" ${fd.w4Status==='married_joint'?'selected':''}>Married filing jointly / qualifying surviving spouse</option>
          <option value="hoh" ${fd.w4Status==='hoh'?'selected':''}>Head of household</option>
        </select>
      </div></div>
      <div class="row col2">
        <div class="field"><label>Multiple jobs? (Step 2c)</label>
          <div class="radio-group" style="flex-direction:row;gap:20px;margin-top:6px;">
            <label class="radio-opt"><input type="radio" name="multijob" value="yes" ${fd.multiJob==='yes'?'checked':''}> Yes</label>
            <label class="radio-opt"><input type="radio" name="multijob" value="no" ${fd.multiJob==='no'?'checked':''}> No</label>
          </div>
        </div>
        <div class="field"><label>Claim exemption?</label>
          <div class="radio-group" style="flex-direction:row;gap:20px;margin-top:6px;">
            <label class="radio-opt"><input type="radio" name="exempt" value="yes" ${fd.exempt==='yes'?'checked':''}> Yes</label>
            <label class="radio-opt"><input type="radio" name="exempt" value="no" ${fd.exempt==='no'?'checked':''}> No</label>
          </div>
        </div>
      </div>
      <div class="row col3">
        <div class="field"><label>Dependent credits ($)</label><input type="number" id="t_dep" value="${fd.depCredits||''}" placeholder="0.00"></div>
        <div class="field"><label>Other income ($)</label><input type="number" id="t_inc" value="${fd.otherIncome||''}" placeholder="0.00"></div>
        <div class="field"><label>Extra withholding ($)</label><input type="number" id="t_extra" value="${fd.extraWH||''}" placeholder="0.00"></div>
      </div>
      <div class="divider">California DE 4</div>
      <div class="row col1"><div class="field"><label>CA filing status</label>
        <select id="t_de4">
          <option value="">Select…</option>
          <option value="single_dual" ${fd.de4Status==='single_dual'?'selected':''}>Single or married (two or more incomes)</option>
          <option value="married_one" ${fd.de4Status==='married_one'?'selected':''}>Married (one income)</option>
          <option value="hoh" ${fd.de4Status==='hoh'?'selected':''}>Head of household</option>
        </select>
      </div></div>
      <div class="row col2">
        <div class="field"><label>Regular allowances (Worksheet A)</label><input type="number" id="t_ca_allow" value="${fd.caAllowances||''}" placeholder="0" min="0" step="1"></div>
        <div class="field"><label>Additional withholding/period ($)</label><input type="number" id="t_ca_extra" value="${fd.caExtra||''}" placeholder="0.00"></div>
      </div>
      <div class="row col1"><div class="field"><label>Claim CA exemption?</label>
        <div class="radio-group" style="flex-direction:row;gap:20px;margin-top:6px;">
          <label class="radio-opt"><input type="radio" name="caexempt" value="yes" ${fd.caExempt==='yes'?'checked':''}> Yes</label>
          <label class="radio-opt"><input type="radio" name="caexempt" value="no" ${fd.caExempt==='no'?'checked':''}> No</label>
        </div>
      </div></div>
    </div>
    ${nav('prevStep', 'saveTax')}`;
  }

  else if (id === 'banking') {
    c.innerHTML = `
    <div class="card">
      <div class="card-title">Direct deposit authorization</div>
      <div class="card-sub">Authorize Rye Electric to deposit your pay electronically. Bring a voided check on your first day.</div>
      <div class="divider" style="margin-top:0;border-top:none;padding-top:0;">Account #1 (required)</div>
      <div class="row col2">
        <div class="field"><label>Account type</label>
          <select id="b_type1"><option value="">Select…</option>
            <option value="checking" ${fd.acct1Type==='checking'?'selected':''}>Checking</option>
            <option value="savings" ${fd.acct1Type==='savings'?'selected':''}>Savings</option>
          </select>
        </div>
        <div class="field"><label>Bank name</label><input id="b_bank1" value="${fd.bank1||''}" placeholder="Bank name"></div>
      </div>
      <div class="row col2">
        <div class="field"><label>Routing number (ABA #)</label><input id="b_routing1" value="${fd.routing1||''}" placeholder="9 digits" maxlength="9"></div>
        <div class="field"><label>Account number</label><input id="b_account1" value="${fd.account1||''}" placeholder="Account number"></div>
      </div>
      <div class="row col1"><div class="field"><label>Deposit amount</label><input id="b_deposit1" value="${fd.deposit1||''}" placeholder="100% or $ amount"></div></div>
      <div class="divider">Account #2 (optional — remainder)</div>
      <div class="row col2">
        <div class="field"><label>Account type</label>
          <select id="b_type2"><option value="">Select…</option>
            <option value="checking" ${fd.acct2Type==='checking'?'selected':''}>Checking</option>
            <option value="savings" ${fd.acct2Type==='savings'?'selected':''}>Savings</option>
          </select>
        </div>
        <div class="field"><label>Bank name</label><input id="b_bank2" value="${fd.bank2||''}" placeholder="Optional"></div>
      </div>
      <div class="row col2">
        <div class="field"><label>Routing number</label><input id="b_routing2" value="${fd.routing2||''}" placeholder="9 digits" maxlength="9"></div>
        <div class="field"><label>Account number</label><input id="b_account2" value="${fd.account2||''}" placeholder="Account number"></div>
      </div>
    </div>
    ${nav('prevStep', 'saveBanking')}`;
  }

  else if (id === 'i9') {
    c.innerHTML = `
    <div class="card">
      <div class="card-title">Employment eligibility — Form I-9 (Section 1)</div>
      <div class="card-sub">Required by federal law. Your employer will verify your documents on your first day.</div>
      <div class="row col3">
        <div class="field"><label>Last name *</label><input id="i_last" value="${fd.i9Last||fd.last||''}" placeholder="Last name"></div>
        <div class="field"><label>First name *</label><input id="i_first" value="${fd.i9First||fd.first||''}" placeholder="First name"></div>
        <div class="field"><label>Middle initial</label><input id="i_mi" value="${fd.i9Mi||fd.mi||''}" maxlength="1" placeholder="M"></div>
      </div>
      <div class="row col2">
        <div class="field"><label>Other last names used</label><input id="i_other" value="${fd.i9Other||''}" placeholder="None"></div>
        <div class="field"><label>Date of birth</label><input type="date" id="i_dob" value="${fd.i9Dob||fd.dob||''}"></div>
      </div>
      <div class="row col1"><div class="field"><label>Address</label><input id="i_addr" value="${fd.i9Addr||fd.addr||''}" placeholder="Street number and name"></div></div>
      <div class="row col3">
        <div class="field"><label>City</label><input id="i_city" value="${fd.i9City||fd.city||''}" placeholder="City"></div>
        <div class="field"><label>State</label><input id="i_st" value="${fd.i9St||fd.state||''}" maxlength="2" placeholder="CA"></div>
        <div class="field"><label>ZIP</label><input id="i_zip" value="${fd.i9Zip||fd.zip||''}" placeholder="ZIP"></div>
      </div>
      <div class="row col2">
        <div class="field"><label>Social Security Number</label><input id="i_ssn" value="${fd.i9Ssn||''}" placeholder="xxx-xx-xxxx" maxlength="11"></div>
        <div class="field"><label>Email</label><input type="email" id="i_email" value="${fd.i9Email||fd.email||''}" placeholder="you@example.com"></div>
      </div>
      <div class="divider">Citizenship / immigration status *</div>
      <div class="radio-group" style="gap:12px;">
        <label class="radio-opt"><input type="radio" name="i9s" value="citizen" ${fd.i9Cit==='citizen'?'checked':''}> A citizen of the United States</label>
        <label class="radio-opt"><input type="radio" name="i9s" value="national" ${fd.i9Cit==='national'?'checked':''}> A noncitizen national of the United States</label>
        <label class="radio-opt"><input type="radio" name="i9s" value="lpr" ${fd.i9Cit==='lpr'?'checked':''}> A lawful permanent resident</label>
        <label class="radio-opt"><input type="radio" name="i9s" value="authorized" ${fd.i9Cit==='authorized'?'checked':''}> A noncitizen authorized to work</label>
      </div>
    </div>
    ${nav('prevStep', 'saveI9')}`;
  }

  else if (id === 'policies') {
    c.innerHTML = `
    <div class="card">
      <div class="card-title">Policy acknowledgements</div>
      <div class="card-sub">Read each summary and check the box to acknowledge. Full text is in your Employee Handbook.</div>

      <div class="divider" style="margin-top:0;border-top:none;padding-top:0;">Confidentiality agreement</div>
      <div class="policy-box">Confidential Information includes bidding techniques, financial data, customer information, pricing, software, and all project documentation. Employees may not disclose this information except in performance of authorized duties. All Confidential Information must be returned upon termination. Non-solicitation clause applies for one year following employment.</div>
      <label class="ack"><input type="checkbox" id="ck1" ${fd.ackC?'checked':''}><span>I have read and agree to the Confidentiality Agreement</span></label>

      <div class="divider">Drug &amp; alcohol policy</div>
      <div class="policy-box">Employees must be free from illegal drugs and alcohol. Testing occurs pre-employment, post-incident, on reasonable suspicion, and randomly. Refusing to submit is grounds for immediate termination. Positive prescription results require verification. I consent to testing and authorize release of results to Rye Electric, Inc.</div>
      <label class="ack"><input type="checkbox" id="ck2" ${fd.ackD?'checked':''}><span>I have read and agree to the Drug &amp; Alcohol Policy</span></label>

      <div class="divider">Harassment &amp; discrimination</div>
      <div class="policy-box">Rye Electric prohibits discrimination and harassment based on race, religion, color, national origin, disability, medical condition, marital status, sex, gender identity, age, sexual orientation, and all other protected classifications. Violations may result in immediate termination. Report any suspected harassment to a supervisor or HR immediately.</div>
      <label class="ack"><input type="checkbox" id="ck3" ${fd.ackH?'checked':''}><span>I have read and agree to the Harassment &amp; Discrimination Policy</span></label>

      <div class="divider">At-will employment</div>
      <div class="policy-box">Employment at Rye Electric is at-will. Terms and conditions may be changed with or without cause or notice, including termination, demotion, promotion, and compensation. Only the Company President may enter into a written agreement modifying at-will status.</div>
      <label class="ack"><input type="checkbox" id="ck4" ${fd.ackA?'checked':''}><span>I understand and agree to at-will employment</span></label>

      <div class="divider">Mutual arbitration policy</div>
      <div class="policy-box">All employment-related disputes must be resolved through binding arbitration under the Federal Arbitration Act and AAA rules. Both you and the Company waive the right to a jury trial. No class or representative claims. The Company pays all arbitrator and AAA fees beyond the local civil court filing fee.</div>
      <label class="ack"><input type="checkbox" id="ck5" ${fd.ackArb?'checked':''}><span>I have read and agree to the Mutual Arbitration Policy</span></label>

      <div class="divider">Employee handbook</div>
      <label class="ack"><input type="checkbox" id="ck6" ${fd.ackHb?'checked':''}><span>I acknowledge receipt of the Rye Electric Employee Handbook (revised Jan 2024)</span></label>
    </div>
    ${nav('prevStep', 'savePolicies')}`;
  }

  else if (id === 'final') {
    const name = [fd.first, fd.last].filter(Boolean).join(' ') || 'New Hire';
    const today = new Date().toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'});
    const row = (label, val) => `<div style="color:#888;font-size:13px;">${label}</div><div style="font-size:13px;">${val||'—'}</div>`;
    const ackRow = (checked, label) => `<div style="display:flex;align-items:center;gap:6px;font-size:13px;">
      <i class="ti ti-${checked?'check':'x'}" style="color:${checked?'#22c55e':'#ef4444'};font-size:14px;"></i>
      <span>${label}</span></div>`;
    c.innerHTML = `
    <div class="card">
      <div class="card-title">Review &amp; submit</div>
      <div class="card-sub">Confirm your information, then type your full legal name to sign all forms.</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem;">
        ${row('Name', name)}${row('Email', fd.email)}
        ${row('Start date', fd.startDate)}${row('Position', fd.title)}
        ${row('Federal filing', fd.w4Status)}${row('CA filing', fd.de4Status)}
        ${row('Bank', fd.bank1)}${row('I-9 status', fd.i9Cit)}
      </div>
      <div class="divider">Policies acknowledged</div>
      <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:1rem;">
        ${ackRow(fd.ackC,'Confidentiality Agreement')}
        ${ackRow(fd.ackD,'Drug & Alcohol Policy')}
        ${ackRow(fd.ackH,'Harassment & Discrimination')}
        ${ackRow(fd.ackA,'At-Will Employment')}
        ${ackRow(fd.ackArb,'Mutual Arbitration Policy')}
        ${ackRow(fd.ackHb,'Employee Handbook Receipt')}
      </div>
      <div class="divider">Electronic signature</div>
      <div style="font-size:13px;color:#888;margin-bottom:12px;line-height:1.5;">By typing your full legal name below you certify all information is true and correct and that you agree to all policies listed above.</div>
      <div class="row col2">
        <div class="field"><label>Full name (e-signature) *</label><input id="f_sig" value="${fd.sig||''}" placeholder="Type your full legal name"></div>
        <div class="field"><label>Date</label><input value="${today}" disabled></div>
      </div>
      <div class="row col1"><div class="field"><label>Driver license number / state</label><input id="f_dl" value="${fd.dl||''}" placeholder="DL number — CA"></div></div>
    </div>
    <div class="btn-row">
      <button class="btn" onclick="prevStep()"><i class="ti ti-arrow-left"></i> Back</button>
      <button class="btn primary" onclick="submitAll()" id="submit-btn"><i class="ti ti-send"></i> Submit all forms</button>
    </div>`;
  }
}

function savePersonal() {
  if (!gv('p_first')||!gv('p_last')||!gv('p_email')||!gv('p_start')) { showToast('Please fill in all required fields (*)'); return; }
  Object.assign(fd, { first:gv('p_first'), mi:gv('p_mi'), last:gv('p_last'), addr:gv('p_addr'), city:gv('p_city'), state:gv('p_state'), zip:gv('p_zip'), phone:gv('p_phone'), cell:gv('p_cell'), email:gv('p_email'), dob:gv('p_dob'), title:gv('p_title'), startDate:gv('p_start'), ecName:gv('p_ec_name'), ecRel:gv('p_ec_rel'), ecPhone:gv('p_ec_phone') });
  nextStep();
}
function saveTax() {
  Object.assign(fd, { w4Status:gv('t_w4'), multiJob:gr('multijob'), exempt:gr('exempt'), depCredits:gv('t_dep'), otherIncome:gv('t_inc'), extraWH:gv('t_extra'), de4Status:gv('t_de4'), caAllowances:gv('t_ca_allow'), caExtra:gv('t_ca_extra'), caExempt:gr('caexempt') });
  nextStep();
}
function saveBanking() {
  if (!gv('b_type1')||!gv('b_bank1')||!gv('b_routing1')||!gv('b_account1')) { showToast('Please fill in Account #1 details'); return; }
  Object.assign(fd, { acct1Type:gv('b_type1'), bank1:gv('b_bank1'), routing1:gv('b_routing1'), account1:gv('b_account1'), deposit1:gv('b_deposit1'), acct2Type:gv('b_type2'), bank2:gv('b_bank2'), routing2:gv('b_routing2'), account2:gv('b_account2') });
  nextStep();
}
function saveI9() {
  if (!gv('i_last')||!gv('i_first')||!gr('i9s')) { showToast('Please fill in required I-9 fields and select citizenship status'); return; }
  Object.assign(fd, { i9Last:gv('i_last'), i9First:gv('i_first'), i9Mi:gv('i_mi'), i9Other:gv('i_other'), i9Dob:gv('i_dob'), i9Addr:gv('i_addr'), i9City:gv('i_city'), i9St:gv('i_st'), i9Zip:gv('i_zip'), i9Ssn:gv('i_ssn'), i9Email:gv('i_email'), i9Phone:gv('i_phone'), i9Cit:gr('i9s') });
  nextStep();
}
function savePolicies() {
  Object.assign(fd, { ackC:gc('ck1'), ackD:gc('ck2'), ackH:gc('ck3'), ackA:gc('ck4'), ackArb:gc('ck5'), ackHb:gc('ck6') });
  if (![fd.ackC,fd.ackD,fd.ackH,fd.ackA,fd.ackArb,fd.ackHb].every(Boolean)) { showToast('Please acknowledge all policies before continuing'); return; }
  nextStep();
}

async function submitAll() {
  const sig = gv('f_sig');
  const name = [fd.first, fd.last].filter(Boolean).join(' ');
  if (!sig) { showToast('Please type your full name as your electronic signature'); return; }
  if (sig.toLowerCase() !== name.toLowerCase()) { showToast('Signature must match your legal name: ' + name); return; }
  fd.sig = sig; fd.dl = gv('f_dl');

  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader-2"></i> Submitting…';

  try {
    const hireName = [fd.first, fd.last].filter(Boolean).join(' ');

    await sbInsert('new_hire_submissions', {
      first_name: fd.first, last_name: fd.last, middle_initial: fd.mi||null,
      address: fd.addr||null, city: fd.city||null, state: fd.state||null, zip: fd.zip||null,
      phone: fd.phone||null, cell: fd.cell||null, email: fd.email,
      date_of_birth: fd.dob||null, job_title: fd.title||null, start_date: fd.startDate,
      ec_name: fd.ecName||null, ec_relationship: fd.ecRel||null, ec_phone: fd.ecPhone||null,
      w4_filing_status: fd.w4Status||null, w4_multiple_jobs: fd.multiJob==='yes', w4_exempt: fd.exempt==='yes',
      w4_dependent_credits: parseFloat(fd.depCredits)||0, w4_other_income: parseFloat(fd.otherIncome)||0, w4_extra_withholding: parseFloat(fd.extraWH)||0,
      de4_filing_status: fd.de4Status||null, de4_allowances: parseInt(fd.caAllowances)||0,
      de4_extra_withholding: parseFloat(fd.caExtra)||0, de4_exempt: fd.caExempt==='yes',
      bank1_type: fd.acct1Type||null, bank1_name: fd.bank1||null, bank1_routing: fd.routing1||null,
      bank1_account: fd.account1||null, bank1_deposit_amount: fd.deposit1||null,
      bank2_type: fd.acct2Type||null, bank2_name: fd.bank2||null, bank2_routing: fd.routing2||null, bank2_account: fd.account2||null,
      i9_citizenship_status: fd.i9Cit||null, i9_ssn: fd.i9Ssn||null,
      ack_confidentiality: !!fd.ackC, ack_drug_alcohol: !!fd.ackD, ack_harassment: !!fd.ackH,
      ack_at_will: !!fd.ackA, ack_arbitration: !!fd.ackArb, ack_handbook: !!fd.ackHb,
      e_signature: fd.sig, drivers_license: fd.dl||null,
      status: 'completed', submitted_at: new Date().toISOString()
    });

    // Fire confirmation emails with full data for PDF generation
    try {
      await fetch(`${SUPABASE_URL}/functions/v1/send-onboarding-email`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_KEY}` },
        body: JSON.stringify({
          first_name: fd.first, last_name: fd.last, middle_initial: fd.mi||null,
          address: fd.addr||null, city: fd.city||null, state: fd.state||null, zip: fd.zip||null,
          phone: fd.phone||null, cell: fd.cell||null, email: fd.email,
          date_of_birth: fd.dob||null, job_title: fd.title||null, start_date: fd.startDate,
          ec_name: fd.ecName||null, ec_relationship: fd.ecRel||null, ec_phone: fd.ecPhone||null,
          w4_filing_status: fd.w4Status||null, w4_multiple_jobs: fd.multiJob==='yes', w4_exempt: fd.exempt==='yes',
          w4_dependent_credits: parseFloat(fd.depCredits)||0, w4_other_income: parseFloat(fd.otherIncome)||0, w4_extra_withholding: parseFloat(fd.extraWH)||0,
          de4_filing_status: fd.de4Status||null, de4_allowances: parseInt(fd.caAllowances)||0,
          de4_extra_withholding: parseFloat(fd.caExtra)||0, de4_exempt: fd.caExempt==='yes',
          bank1_type: fd.acct1Type||null, bank1_name: fd.bank1||null, bank1_routing: fd.routing1||null,
          bank1_account: fd.account1||null, bank1_deposit_amount: fd.deposit1||null,
          bank2_type: fd.acct2Type||null, bank2_name: fd.bank2||null, bank2_routing: fd.routing2||null, bank2_account: fd.account2||null,
          i9_citizenship_status: fd.i9Cit||null, i9_ssn: fd.i9Ssn||null,
          ack_confidentiality: !!fd.ackC, ack_drug_alcohol: !!fd.ackD, ack_harassment: !!fd.ackH,
          ack_at_will: !!fd.ackA, ack_arbitration: !!fd.ackArb, ack_handbook: !!fd.ackHb,
          e_signature: fd.sig, drivers_license: fd.dl||null,
          submitted_at: new Date().toISOString()
        })
      });
    } catch(e) { console.warn('Email failed:', e); }

    document.getElementById('progress').innerHTML = '';
    document.getElementById('content').innerHTML = `
    <div class="success">
      <div class="success-icon"><i class="ti ti-check"></i></div>
      <h2>You're all set, ${fd.first}!</h2>
      <p>All your new hire paperwork has been submitted to Rye Electric securely.</p>
      <p>Please bring a valid photo ID and a voided check on your first day (${fd.startDate}) for I-9 verification and direct deposit setup.</p>
    </div>`;
  } catch(err) {
    btn.disabled = false; btn.innerHTML = '<i class="ti ti-send"></i> Submit all forms';
    showError('Submission failed: ' + err.message);
  }
}

function nextStep() { step = Math.min(step+1, STEPS.length-1); render(); window.scrollTo(0,0); }
function prevStep() { step = Math.max(step-1, 0); render(); window.scrollTo(0,0); }

render();
</script>
</body>
</html>
