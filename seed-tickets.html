function log(msg, type='info') {
  const d = document.getElementById('log');
  d.innerHTML += `<div class="status ${type}">${msg}</div>`;
}

async function runSeed() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = '⏳ Pushing tickets...';
  log('Starting — pushing 9 tickets to Supabase...', 'info');

  let ok = 0, fail = 0;
  for (const t of tickets) {
    const row = {
      id: t.id, customer: t.customer, address: t.address, type: t.type,
      date: t.date, tech: t.tech, po: t.po, nte: t.nte, status: t.status,
      scope: t.scope, notes: t.notes, equipment: t.equipment,
      labor: t.labor, materials: t.materials,
      urgency: t.urgency, source: t.source,
      paid_amount: t.paid_amount || null,
      created_at: t.created_at,
      ratings: {}, daily_report: {}, attachments: [],
    };
    try {
      const res = await fetch(SB_URL + '/rest/v1/service_tickets', {
        method: 'POST', headers: HDRS, body: JSON.stringify(row)
      });
      if (res.ok || res.status === 201) {
        log(`✓ ${t.id} — ${t.customer} — $${t.paid_amount || t.nte}`, 'ok');
        ok++;
      } else {
        const txt = await res.text();
        log(`✗ ${t.id} — ${txt}`, 'err');
        fail++;
      }
    } catch(e) {
      log(`✗ ${t.id} — ${e.message}`, 'err');
      fail++;
    }
  }

  log(`<strong>Complete — ${ok} pushed, ${fail} failed.</strong>`, ok === tickets.length ? 'ok' : 'err');
  btn.textContent = ok === tickets.length ? '✓ All Done!' : '⚠ Some failed — check above';
}
